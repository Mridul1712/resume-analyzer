<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Analyzer</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 700px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h1 {
        text-align: center;
        color: white;
        margin-bottom: 20px;
    }

    label {
        color: white;
        font-size: 14px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0 20px;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    textarea {
        resize: none;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #ff7a18;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff512f;
        transform: scale(1.05);
    }

    .result {
        margin-top: 20px;
        background: rgba(255,255,255,0.2);
        padding: 20px;
        border-radius: 15px;
        animation: fadeIn 1s ease-in-out;
    }

    ul {
        padding-left: 20px;
        color: white;
    }

    .progress-bar {
        width: 100%;
        height: 20px;
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0;
    }

    .progress {
        height: 100%;
        background: linear-gradient(to right, #00c6ff, #0072ff);
        width: 0;
        animation: fillBar 1.5s forwards;
    }

    @keyframes fillBar {
        from {width: 0;}
        to {width: {{ match_score }}%;}
    }

    .score-text {
        color: white;
        font-weight: bold;
    }

    .missing {
        color: #ff4d4d;
    }

</style>
</head>

<body>

<div class="container">
    <h1>🚀 Resume Analyzer</h1>

    <form method="POST" enctype="multipart/form-data">
        <label>Upload Resume</label>
        <input type="file" name="resume" required>

        <label>Job Description</label>
        <textarea name="jd" rows="5" required></textarea>

        <button type="submit">Analyze</button>
    </form>

    {% if skills %}
    <div class="result">

        <h3 style="color:white;">✅ Skills Detected</h3>
        <ul>
            {% for skill in skills %}
                <li>{{ skill }}</li>
            {% endfor %}
        </ul>

        <h3 style="color:white;">📊 Match Score</h3>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <p class="score-text">{{ match_score }}%</p>

        <h3 style="color:white;">❌ Missing Skills</h3>
        <ul class="missing">
            {% for skill in missing_skills %}
                <li>{{ skill }}</li>
            {% endfor %}
        </ul>

    </div>
    {% endif %}
</div>

</body>
</html>
